name: Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Kjør scraper
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          SCRAPE_ONCE: '1'
          FINN_SHARD_MODE: 'year'
          FINN_MAX_SEARCH_PAGES: '200'
          FINN_PAGE_DELAY_MS: '1000'
        run: npm run scrape
