name: Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '17 1 * * *'
    - cron: '43 5 * * *'
    - cron: '7 9 * * *'
    - cron: '31 13 * * *'
    - cron: '55 17 * * *'
    - cron: '22 21 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Tilfeldig forsinkelse (0–20 min)
        run: sleep $((RANDOM % 1200))

      - name: Kjør scraper
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          SCRAPE_ONCE: '1'
          FINN_SHARD_MODE: 'year'
          FINN_MAX_SEARCH_PAGES: '200'
          FINN_PAGE_DELAY_MS: '1000'
          FINN_DEEP_SCRAPE_MAX: '20000'
        run: npm run scrape
