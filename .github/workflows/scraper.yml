name: Run Scraper

on:
  schedule:
    - cron: '0 */2 * * *'   # Every 2 hours, same as server.ts
  workflow_dispatch:          # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper (one-shot)
        env:
          SCRAPER_EMAIL: ${{ secrets.SCRAPER_EMAIL }}
          SCRAPER_PASSWORD: ${{ secrets.SCRAPER_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          FINN_MAX_SEARCH_PAGES: '50'
          FINN_PAGE_DELAY_MS: '1500'
          FINN_DEEP_SCRAPE_MAX: '0'
          RUN_SCRAPER_ON_START: 'true'
          NODE_ENV: 'production'
          # Firebase config inline (same as firebase-applet-config.json)
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIRESTORE_DATABASE_ID: ${{ secrets.VITE_FIRESTORE_DATABASE_ID }}
        run: |
          # Run scraper and exit after first scan completes
          timeout 25m npx tsx server.ts &
          PID=$!
          # Wait for scraper to finish (it logs "Analyzer finished." when done)
          for i in $(seq 1 150); do
            sleep 10
            if ! kill -0 $PID 2>/dev/null; then break; fi
          done
          kill $PID 2>/dev/null || true
